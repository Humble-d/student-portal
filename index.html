<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCT | Secure Login</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; width: 320px; padding: 40px 20px; border-radius: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo-area img { width: 120px; margin-bottom: 20px; }
        .input-group { margin: 30px 0; border-bottom: 2px solid #eee; }
        input { border: none; width: 100%; padding: 10px; outline: none; text-align: center; font-size: 1rem; }
        .btn-orange { background: #f39c12; color: white; border: none; padding: 12px 50px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-orange:hover { background: #e67e22; }
        .footer-link { margin-top: 15px; font-size: 0.8rem; color: #888; text-decoration: none; display: block; }
        #error-msg { color: red; font-size: 0.8rem; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-area">
        <img src="school_logo.png" alt="HCT Logo">
    </div>
    
    <div id="login-step">
        <div class="input-group">
            <input type="text" id="secretCode" placeholder="ENTER SECRET ACCESS CODE">
        </div>

        <button type="button" class="btn-orange" onclick="verifyAccess()">PROCEED</button>
        
        <p style="margin-top: 20px; font-size: 0.8rem;">
            New Student? <a href="signup.html" style="color: #f39c12; font-weight: bold; text-decoration: none;">Register Here</a>
        </p>
        
        <p id="error-msg">Invalid Code. Please pay registration fee.</p>

        <a href="https://wa.me/message/5636MVP3GLY7A1" class="footer-link">
            Don't have a code? Chat Admin
        </a>
    </div> 
</div>

<script>
function verifyAccess() {
  const codeInput = document.getElementById('secretCode').value.trim();
  const btn = document.querySelector('.btn-orange');

  if (!codeInput) {
    alert("Please enter your access code first!");
    return;
  }
  
  btn.innerText = "Checking...";
  btn.disabled = true;

  // 1. Direct Web App URL
  const webAppUrl = "https://script.google.com/macros/s/AKfycby5CQVpB-T7WsHo6pWTXCl1tsis-DCVd-gGA7B08UbcXxLvKGawL8FJdydvyKixN3ELkg/exec";
  
  // 2. We generate a random name for the listener to safely bypass security blocks
  const callbackName = "studentAuth_" + Math.random().toString(36).substr(2, 9);
  
  // 3. This catches Google's response
  window[callbackName] = function(data) {
    btn.innerText = "PROCEED";
    btn.disabled = false;
    
    if (data.result === "Valid") {
      alert("Access Granted!");
      localStorage.setItem("hct_access", "granted");
        // Use ./ to tell the browser "Look in the same folder I am in right now"
      window.location.href = "./portal.html";
    } else {
      alert("Invalid Code. Please make sure you entered it correctly.");
    }
    
    cleanup();
  };

  const scriptElement = document.createElement('script');
  scriptElement.id = callbackName;
  
  // We add the time at the end to force the browser to ignore its saved memory!
  const cacheBuster = "&t=" + new Date().getTime();
  scriptElement.src = `${webAppUrl}?code=${encodeURIComponent(codeInput)}&callback=${callbackName}${cacheBuster}`;
  
  scriptElement.onerror = function() {
      alert("Network error. Your Google Script might be taking too long to load.");
      btn.innerText = "PROCEED";
      btn.disabled = false;
      cleanup();
  };

  function cleanup() {
    const el = document.getElementById(callbackName);
    if (el) document.body.removeChild(el);
    delete window[callbackName];
  }

  document.body.appendChild(scriptElement);
}
</script>

</body>
</html>
