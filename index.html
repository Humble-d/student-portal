<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCT | Secure Login</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .auth-card { background: white; width: 320px; padding: 40px 20px; border-radius: 30px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .logo-area img { width: 120px; margin-bottom: 20px; }
        .input-group { margin: 30px 0; border-bottom: 2px solid #eee; }
        input { border: none; width: 100%; padding: 10px; outline: none; text-align: center; font-size: 1rem; }
        .btn-orange { background: #f39c12; color: white; border: none; padding: 12px 50px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-orange:hover { background: #e67e22; }
        .footer-link { margin-top: 15px; font-size: 0.8rem; color: #888; text-decoration: none; display: block; }
        #error-msg { color: red; font-size: 0.8rem; display: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="logo-area">
        <img src="school_logo.png" alt="HCT Logo">
    </div>
    
    <div id="login-step">
        <div class="input-group">
            <input type="text" id="secretCode" placeholder="ENTER SECRET ACCESS CODE">
        </div>

        <button type="button" class="btn-orange" onclick="verifyAccess()">PROCEED</button>
        
        <p style="margin-top: 20px; font-size: 0.8rem;">
            New Student? <a href="signup.html" style="color: #f39c12; font-weight: bold; text-decoration: none;">Register Here</a>
        </p>
        
        <p id="error-msg">Invalid Code. Please pay registration fee.</p>

        <a href="https://wa.me/message/5636MVP3GLY7A1" class="footer-link">
            Don't have a code? Chat Admin
        </a>
    </div> 
</div>




    <script>
async function uploadLessonFile() {
  const fileInput = document.getElementById('lessonFile'); // Your file input ID
  const btn = document.getElementById('uploadBtn'); // Your green button ID
  
  if (!fileInput.files.length) {
    alert("Please select a file first!");
    return;
  }

  const file = fileInput.files[0];
  btn.innerText = "PROCESSING...";
  btn.disabled = true;

  const reader = new FileReader();
  
  reader.onload = async function(e) {
    const base64Data = e.target.result.split(',')[1];
    
    // We break the file into 500KB chunks so Google doesn't crash
    const chunkSize = 500000; 
    const totalChunks = Math.ceil(base64Data.length / chunkSize);
    const fileId = "file_" + Math.random().toString(36).substr(2, 9);

    for (let i = 0; i < totalChunks; i++) {
      const start = i * chunkSize;
      const end = Math.min(start + chunkSize, base64Data.length);
      const chunk = base64Data.slice(start, end);
      
      btn.innerText = `UPLOADING (${Math.round((i / totalChunks) * 100)}%)...`;

      const payload = {
        action: "upload_chunk",
        fileId: fileId,
        chunk: chunk,
        chunkIndex: i,
        totalChunks: totalChunks,
        fileName: file.name,
        mimeType: file.type
      };

      try {
        const response = await fetch("https://script.google.com/macros/s/AKfycby5CQVpB-T7WsHo6pWTXCl1tsis-DCVd-gGA7B08UbcXxLvKGawL8FJdydvyKixN3ELkg/exec", {
          method: "POST",
          body: JSON.stringify(payload)
        });
        
        const result = await response.text();
        
        if (i === totalChunks - 1) {
          alert("Success! File uploaded directly to your drive and registered.");
          btn.innerText = "UPLOAD COMPLETED";
          location.reload(); // Refresh to see the new lesson
        }
      } catch (error) {
        console.error(error);
        alert("Upload failed. Trying again might help.");
        btn.innerText = "TRY AGAIN";
        btn.disabled = false;
        return;
      }
    }
  };
  
  reader.readAsDataURL(file);
}
</script>

    

</body>
</html>
